<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIVE NIGHTS AT TERRY'S: THE DEFINITIVE EDITION</title>
    <style>
        /* --- CORE STYLES --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        #game-viewport { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; align-items: center; background: #050505; }
        
        /* --- CRT & STATIC OVERLAY --- */
        .crt-overlay { position: absolute; inset: 0; z-index: 1000; pointer-events: none; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02)); background-size: 100% 3px, 3px 100%; }
        .vignette { position: absolute; inset: 0; z-index: 1001; pointer-events: none; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.9) 100%); }
        
        /* --- MENU SYSTEM --- */
        #main-menu { position: absolute; inset: 0; z-index: 2000; background: url('IMG_5510.jpeg') center/cover; display: flex; flex-direction: column; justify-content: center; padding-left: 100px; transition: opacity 1s; }
        .menu-title { font-size: 80px; text-shadow: 5px 5px #f00; margin: 0; }
        .menu-btn { background: none; border: none; color: #fff; font-family: inherit; font-size: 30px; text-align: left; cursor: pointer; margin: 10px 0; transition: 0.2s; }
        .menu-btn:hover { color: #f00; padding-left: 20px; }

        /* --- THE OFFICE --- */
        #office-view { width: 1024px; height: 768px; position: relative; background: url('IMG_5478.jpeg') center/cover; transition: transform 0.05s; display: none; }
        .door { position: absolute; top: 0; bottom: 0; width: 150px; background: #111; z-index: 50; transition: transform 0.3s ease-in; border-right: 5px solid #444; }
        #door-left { left: 0; transform: translateY(-100%); }
        #door-left.closed { transform: translateY(0); }

        /* --- MONITOR SYSTEM --- */
        #monitor-overlay { position: absolute; inset: 0; background: #000; z-index: 500; display: none; border: 20px solid #222; }
        #cam-render { width: 100%; height: 100%; object-fit: contain; filter: brightness(0.6) sepia(0.3) contrast(1.2); }
        .map-container { position: absolute; bottom: 30px; right: 30px; width: 250px; height: 200px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; padding: 10px; }
        .cam-node { width: 40px; height: 30px; background: #040; border: 1px solid #0f0; color: #fff; font-size: 10px; cursor: pointer; margin: 5px; }
        .cam-node.active { background: #0f0; color: #000; }

        /* --- UI COMPONENTS --- */
        .hud-box { position: absolute; background: rgba(0,0,0,0.8); border: 2px solid #0f0; padding: 15px; z-index: 800; }
        #time-display { top: 20px; right: 20px; font-size: 35px; }
        #power-status { bottom: 20px; left: 20px; width: 250px; }
        .usage-bar { display: inline-block; width: 15px; height: 25px; background: #0f0; margin-left: 3px; }

        /* --- JUMPSCARE --- */
        #jumpscare-layer { position: absolute; inset: 0; z-index: 5000; display: none; background: #000; }
        #jumpscare-layer img { width: 100%; height: 100%; object-fit: cover; animation: glitch 0.1s infinite; }
        @keyframes glitch { 0% { transform: scale(1.1) translate(10px, 0); } 50% { transform: scale(1.0) translate(-10px, 5px); } 100% { transform: scale(1.2) translate(0, -5px); } }
    </style>
</head>
<body>

<div id="game-viewport">
    <div class="crt-overlay"></div>
    <div class="vignette"></div>

    <audio id="snd-scream" src="scream.mp3" preload="auto"></audio>
    <audio id="snd-door" src="door_close.mp3" preload="auto"></audio>
    <audio id="snd-static" src="static.mp3" loop preload="auto"></audio>

    <div id="main-menu">
        <h1 class="menu-title">5 NIGHTS<br>AT TERRY'S</h1>
        <p>2026 Edition</p>
        <button class="menu-btn" onclick="startGame(1)">NEW GAME</button>
        <button class="menu-btn" onclick="loadGame()">CONTINUE</button>
        <button class="menu-btn" onclick="alert('Terry is watching.')">OPTIONS</button>
    </div>

    <div id="office-view">
        <div id="door-left" class="door"></div>
        <button onclick="toggleLeftDoor()" style="position:absolute; left:160px; top:50%; z-index:60;">DOOR</button>
        
        <div class="hud-box" id="time-display">12:00 AM</div>
        <div class="hud-box" id="power-status">
            POWER: <span id="p-val">100</span>%<br>
            USAGE: <span id="u-bars"></span>
        </div>

        <div id="monitor-flip" style="position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:500px; height:50px; background:rgba(255,255,255,0.2); text-align:center; line-height:50px; cursor:pointer;" onmouseover="openMonitor()">CAMERAS</div>
    </div>

    <div id="monitor-overlay">
        <img id="cam-render" src="">
        <div class="map-container">
            <p>FACILITY MAP</p>
            <button class="cam-node" id="c1" onclick="switchCam(1)">CAM 1</button>
            <button class="cam-node" id="c2" onclick="switchCam(2)">CAM 2</button>
            <button class="cam-node" onclick="closeMonitor()" style="background:red;">EXIT</button>
        </div>
    </div>

    <div id="jumpscare-layer">
        <img src="IMG_5491.jpeg">
    </div>
</div>

<script>
/**
 * TERRY_ENGINE_V1.0
 * Deep logic for character AI, Power Grids, and State Management.
 */

const STATE = {
    power: 100,
    hour: 0,
    night: 1,
    isDoorClosed: false,
    isMonitorOpen: false,
    currentCam: 1,
    terryLocation: 0, // 0: Start, 1: Car, 2: Hallway, 3: Office
    aiDifficulty: 3,
    gameActive: false
};

// 1. INITIALIZATION
function startGame(nightNum) {
    STATE.night = nightNum;
    STATE.aiDifficulty = nightNum * 2;
    document.getElementById('main-menu').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('main-menu').style.display = 'none';
        document.getElementById('office-view').style.display = 'block';
        STATE.gameActive = true;
        initSystems();
    }, 1000);
}

function initSystems() {
    // Clock System
    setInterval(() => {
        if(!STATE.gameActive) return;
        STATE.hour++;
        if(STATE.hour >= 6) winNight();
        document.getElementById('time-display').innerText = STATE.hour + ":00 AM";
    }, 60000);

    // Power System
    setInterval(() => {
        if(!STATE.gameActive) return;
        let usage = 1 + (STATE.isDoorClosed ? 2 : 0) + (STATE.isMonitorOpen ? 1 : 0);
        STATE.power -= (usage * 0.15);
        
        updatePowerUI(usage);
        if(STATE.power <= 0) gameOver("Power Failure");
    }, 1000);

    // AI System
    setInterval(() => {
        if(!STATE.gameActive) return;
        moveTerry();
    }, 5000);
}

// 2. POWER UI
function updatePowerUI(usage) {
    document.getElementById('p-val').innerText = Math.floor(STATE.power);
    let bars = "";
    for(let i=0; i<usage; i++) bars += "<div class='usage-bar'></div>";
    document.getElementById('u-bars').innerHTML = bars;
}

// 3. AI LOGIC
function moveTerry() {
    let roll = Math.floor(Math.random() * 20);
    if(roll < STATE.aiDifficulty) {
        if(STATE.terryLocation < 3) {
            STATE.terryLocation++;
            console.log("Terry moved to: " + STATE.terryLocation);
        } else {
            if(!STATE.isDoorClosed) {
                gameOver("Terry Caught You");
            } else {
                STATE.terryLocation = 0; // Reset
                console.log("Terry was blocked by the door!");
            }
        }
        if(STATE.isMonitorOpen) updateCamView();
    }
}

// 4. PLAYER ACTIONS
function toggleLeftDoor() {
    STATE.isDoorClosed = !STATE.isDoorClosed;
    document.getElementById('door-left').classList.toggle('closed');
}

function openMonitor() {
    STATE.isMonitorOpen = true;
    document.getElementById('monitor-overlay').style.display = 'block';
    updateCamView();
}

function closeMonitor() {
    STATE.isMonitorOpen = false;
    document.getElementById('monitor-overlay').style.display = 'none';
}

function switchCam(id) {
    STATE.currentCam = id;
    updateCamView();
}

function updateCamView() {
    const feed = document.getElementById('cam-render');
    if(STATE.currentCam === 1) {
        feed.src = (STATE.terryLocation === 1) ? 'IMG_5473.jpeg' : 'IMG_5478.jpeg';
    } else {
        feed.src = (STATE.terryLocation === 2) ? 'unnamed.jpg' : 'IMG_5478.jpeg';
    }
}

// 5. GAME STATES
function gameOver(reason) {
    STATE.gameActive = false;
    document.getElementById('jumpscare-layer').style.display = 'block';
    document.getElementById('snd-scream').play();
    setTimeout(() => { location.reload(); }, 3000);
}

function winNight() {
    STATE.gameActive = false;
    alert("NIGHT " + STATE.night + " COMPLETED. TERRY IS IMPRESSED.");
    localStorage.setItem('terryNight', STATE.night + 1);
    location.reload();
}

function loadGame() {
    let saved = localStorage.getItem('terryNight');
    if(saved) startGame(parseInt(saved));
    else startGame(1);
}
</script>
</body>
</html>
